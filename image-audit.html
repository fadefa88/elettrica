<!doctype html><html lang="it"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Audit immagini Motornet</title><style>body{margin:0;font-family:system-ui,-apple-system,Segoe UI,sans-serif;background:#f6f8fb;color:#142033}header{position:sticky;top:0;background:#f6f8fbee;backdrop-filter:blur(10px);border-bottom:1px solid #dfe5ef;z-index:2}.wrap{max-width:1400px;margin:auto;padding:18px}h1{margin:0 0 6px;font-size:24px}.sub{margin:0;color:#64748b}.stats,.filters{display:grid;gap:10px;margin-top:14px}.stats{grid-template-columns:repeat(5,1fr)}.filters{grid-template-columns:2fr repeat(4,1fr)}.card{background:#fff;border:1px solid #dfe5ef;border-radius:14px;padding:12px}.card b{font-size:24px}input,select,button{height:40px;border:1px solid #dfe5ef;border-radius:10px;background:#fff;padding:0 10px}button{background:#0f766e;color:#fff;font-weight:700;cursor:pointer}table{width:100%;border-collapse:collapse;background:#fff;border:1px solid #dfe5ef;border-radius:14px;overflow:hidden}th,td{border-bottom:1px solid #dfe5ef;padding:9px;text-align:left;font-size:13px;vertical-align:middle}th{background:#eef2f7;color:#475569;text-transform:uppercase;font-size:11px}img{width:120px;height:74px;object-fit:contain;background:#f1f5f9;border-radius:10px}.path{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px;word-break:break-all;color:#475569}.ok{color:#137c43;font-weight:800}.bad{color:#b42318;font-weight:800}.warn{color:#a15c00;font-weight:800}.pager{display:flex;justify-content:space-between;gap:10px;align-items:center;margin:14px 0}.bar{height:8px;background:#e2e8f0;border-radius:99px;margin-top:10px;overflow:hidden}.bar div{height:100%;width:0;background:#0f766e}@media(max-width:900px){.stats,.filters{grid-template-columns:1fr}.wrap{padding:12px}main{overflow:auto}table{min-width:1000px}}</style></head><body><header><div class="wrap"><h1>Audit immagini Motornet</h1><p class="sub">Controlla se ogni modello in <code>data/cars_motornet.json</code> ha un'immagine realmente caricabile. <a href="index.html">Torna al comparatore</a></p><div class="stats"><div class="card"><b id="tot">0</b><br>Record</div><div class="card"><b id="ok">0</b><br>OK</div><div class="card"><b id="bad">0</b><br>Mancanti</div><div class="card"><b id="nop">0</b><br>Senza path</div><div class="card"><b id="chk">0</b><br>Verificate</div></div><div class="filters"><input id="q" placeholder="Cerca marca, modello, versione, path"><select id="cat"><option value="">Tutte</option><option value="ev">Elettriche</option><option value="thermal">Termiche</option></select><select id="brand"><option value="">Tutte le marche</option></select><select id="st"><option value="">Tutti gli stati</option><option value="ok">OK</option><option value="missing">Mancanti</option><option value="no-path">Senza path</option><option value="pending">Da verificare</option></select><button id="csv">CSV mancanti</button></div><div class="bar"><div id="bar"></div></div><p class="sub" id="msg">Caricamento catalogo...</p></div></header><main class="wrap"><div class="pager"><div><button id="prev">←</button> <button id="next">→</button> <span id="page"></span></div><select id="size"><option>50</option><option selected>100</option><option>200</option><option>500</option></select></div><table><thead><tr><th>Img</th><th>Marca / modello</th><th>Versione</th><th>Cat.</th><th>Stato</th><th>Path</th></tr></thead><tbody id="rows"><tr><td colspan="6">Caricamento...</td></tr></tbody></table></main><script>(()=>{const $=id=>document.getElementById(id),esc=s=>String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])),path=c=>String(c.image_url||c.image_local_path||c.image_path||'').replace(/^\.\//,'').trim();let cars=[],filtered=[],status={},page=1,size=100,checked=0,ok=0,bad=0,nop=0,idx=0,active=0;function stat(){tot.textContent=cars.length;chk.textContent=checked;window.ok.textContent=ok;window.bad.textContent=bad;window.nop.textContent=nop;bar.style.width=(cars.length?Math.round(checked/cars.length*100):0)+'%';msg.textContent=`Verifica immagini: ${checked}/${cars.length}`}function sOf(c){return status[c.__i]||(!path(c)?'no-path':'pending')}function filt(){let q=qEl.value.toLowerCase(),ca=cat.value,b=brand.value,stv=st.value;filtered=cars.filter(c=>{let t=[c.brand,c.model,c.version,c.fuel,c.category,path(c)].join(' ').toLowerCase();if(q&&!t.includes(q))return false;if(ca&&String(c.category||'').toLowerCase()!==ca)return false;if(b&&c.brand!==b)return false;if(stv&&sOf(c)!==stv)return false;return true});page=1;draw()}function draw(){let max=Math.max(1,Math.ceil(filtered.length/size));if(page>max)page=max;let part=filtered.slice((page-1)*size,page*size);window.page.textContent=`Pagina ${page}/${max} - ${filtered.length} record`;rows.innerHTML=part.length?part.map(c=>{let p=path(c),s=sOf(c),img=p&&s!=='missing'?`<img loading="lazy" src="${esc(p)}">`:`<span class="${s==='no-path'?'warn':'bad'}">${s==='no-path'?'NO PATH':'ERRORE'}</span>`;return `<tr><td>${img}</td><td><b>${esc(c.brand)}</b><br>${esc(c.model)}<br><small>${esc(c.fuel)}</small></td><td>${esc(c.version)}<br><small>${esc(c.id)}</small></td><td>${esc(c.category)}</td><td class="${s==='ok'?'ok':s==='missing'?'bad':s==='no-path'?'warn':''}">${s}</td><td class="path">${esc(p)}</td></tr>`}).join(''):'<tr><td colspan="6">Nessun risultato</td></tr>'}function check(c){return new Promise(r=>{let p=path(c);if(!p)return r('no-path');let im=new Image(),done=0,fin=s=>{if(!done){done=1;r(s)}};im.onload=()=>fin('ok');im.onerror=()=>fin('missing');im.src=p+(p.includes('?')?'&':'?')+'audit='+Date.now();setTimeout(()=>fin('missing'),12000)})}function pump(){while(active<12&&idx<cars.length){let c=cars[idx++];active++;check(c).then(s=>{status[c.__i]=s;checked++;if(s==='ok')ok++;else if(s==='missing')bad++;else nop++}).finally(()=>{active--;stat();if(checked%50===0||checked===cars.length){draw()}pump()})}}function csv(){let out=['id,brand,model,version,category,fuel,image_path,status'];cars.forEach(c=>{let s=sOf(c);if(s==='missing'||s==='no-path')out.push([c.id,c.brand,c.model,c.version,c.category,c.fuel,path(c),s].map(v=>'"'+String(v??'').replace(/"/g,'""')+'"').join(','))});let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([out.join('\n')],{type:'text/csv'}));a.download='motornet-missing-images.csv';a.click()}let qEl=q;[q,cat,brand,st].forEach(x=>x.oninput=filt);size.onchange=()=>{size=+window.size.value;draw()};prev.onclick=()=>{page=Math.max(1,page-1);draw()};next.onclick=()=>{page++;draw()};csv.onclick=csv;fetch('data/cars_motornet.json?v='+Date.now(),{cache:'no-store'}).then(r=>r.json()).then(d=>{cars=(Array.isArray(d)?d:d.cars||[]).map((c,i)=>({...c,__i:i}));filtered=cars.slice();brand.innerHTML+=[...new Set(cars.map(c=>c.brand).filter(Boolean))].sort().map(b=>`<option>${esc(b)}</option>`).join('');stat();draw();pump()}).catch(e=>{rows.innerHTML='<tr><td colspan="6">Errore: '+esc(e.message)+'</td></tr>'})})();</script></body></html>
