name: Fetch car images

on:
  workflow_dispatch:
    inputs:
      limit:
        description: "Maximum number of catalogue cars to process"
        required: false
        default: "20"
      delay:
        description: "Seconds to wait between Wikimedia requests"
        required: false
        default: "5"
      query_limit:
        description: "Maximum search queries per car"
        required: false
        default: "1"
      result_limit:
        description: "Maximum image results per query"
        required: false
        default: "8"

permissions:
  contents: write

concurrency:
  group: fetch-car-images
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch Wikimedia Commons images
        run: python scripts/fetch_car_images.py --limit "${{ inputs.limit }}" --delay "${{ inputs.delay }}" --query-limit "${{ inputs.query_limit }}" --result-limit "${{ inputs.result_limit }}"

      - name: Commit images and metadata
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add assets/cars data/car_images.json
          if git diff --cached --quiet; then
            echo "No car images to commit."
            exit 0
          fi
          git commit -m "Fetch reusable car images"
          git pull --rebase origin "${GITHUB_REF_NAME}" || true
          git push
