name: Import Auto.it catalogue

on:
  workflow_dispatch:
    inputs:
      limit:
        description: 'Numero massimo auto da importare'
        required: false
        default: '40'
      pages_per_fuel:
        description: 'Pagine lista per alimentazione'
        required: false
        default: '1'
      delay:
        description: 'Secondi tra richieste'
        required: false
        default: '8'

permissions:
  contents: write

jobs:
  import-autoit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4
      - name: Import Auto.it catalogue
        run: |
          python scripts/import_autoit.py --limit "${{ github.event.inputs.limit }}" --pages-per-fuel "${{ github.event.inputs.pages_per_fuel }}" --delay "${{ github.event.inputs.delay }}"
      - name: Commit imported catalogue
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/cars_autoit.json
          if git diff --cached --quiet; then
            echo "No Auto.it catalogue changes to commit."
            exit 0
          fi
          git commit -m "Import Auto.it catalogue"
          git pull --rebase origin main || true
          git push
