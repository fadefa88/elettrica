name: Import Motornet catalogue

on:
  workflow_dispatch:
    inputs:
      limit:
        description: 'Numero massimo auto totali nel JSON. Usa 0 per nessun limite'
        required: false
        default: '0'
      brand_codes:
        description: 'Test su marche specifiche, es. ABA,ROL. Vuoto = tutte'
        required: false
        default: ''
      delay:
        description: 'Secondi tra pagine Motornet'
        required: false
        default: '8'
      download_images:
        description: 'Scarica immagini Motornet nel repo'
        required: false
        default: 'true'
      resume_after_last_imported_brand:
        description: 'Salta anche ultimo brand importato. Usa true solo se sai che quel brand era completo'
        required: false
        default: 'false'

permissions:
  contents: write

defaults:
  run:
    shell: bash

jobs:
  import-motornet:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests playwright
          python -m playwright install --with-deps chromium

      - name: Import Motornet catalogue
        run: |
          python scripts/import_motornet_resume.py \
            --limit "${{ github.event.inputs.limit }}" \
            --brand-codes "${{ github.event.inputs.brand_codes }}" \
            --delay "${{ github.event.inputs.delay }}" \
            --download-images "${{ github.event.inputs.download_images }}" \
            --resume-after-last-imported-brand "${{ github.event.inputs.resume_after_last_imported_brand }}" \
            --checkpoint-every "25" \
            --checkpoint-commit "true"

      - name: Validate generated catalogue
        run: |
          test -f data/cars_motornet.json
          python -m json.tool data/cars_motornet.json > /dev/null
          python - <<'PY'
          import json
          from pathlib import Path
          p = Path('data/cars_motornet.json')
          data = json.loads(p.read_text(encoding='utf-8'))
          cars = data.get('cars') or []
          ev = [c for c in cars if c.get('category') == 'electric']
          ice = [c for c in cars if c.get('category') != 'electric']
          print(f"Motornet JSON generated: status={data.get('status')} cars={len(cars)} electric={len(ev)} thermal={len(ice)}")
          print(f"File size: {p.stat().st_size} bytes")
          PY

      - name: Postprocess Motornet catalogue
        run: |
          python scripts/postprocess_motornet_catalog.py
          python scripts/derive_ev_battery_fields.py
          python -m json.tool data/cars_motornet.json > /dev/null

      - name: Commit imported catalogue
        run: |
          set -e
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          mkdir -p assets/cars/motornet
          git add data/cars_motornet.json assets/cars/motornet
          if [ -f data/cars_motornet_resume_state.json ]; then
            git add data/cars_motornet_resume_state.json
          fi
          if git diff --cached --quiet; then
            echo "No Motornet catalogue changes to commit."
            exit 0
          fi
          git commit -m "Import Motornet catalogue"
          for attempt in 1 2 3; do
            echo "Push attempt $attempt"
            if git pull --rebase --autostash origin main && git push; then
              echo "Motornet catalogue committed and pushed."
              exit 0
            fi
            git rebase --abort || true
            sleep 5
          done
          echo "Unable to push Motornet catalogue after retries."
          exit 1

      - name: Upload Motornet catalogue artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: motornet-catalogue
          path: |
            data/cars_motornet.json
            data/cars_motornet_resume_state.json
            assets/cars/motornet
          if-no-files-found: warn
