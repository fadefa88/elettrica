name: Import Auto.it catalogue

on:
  workflow_dispatch:
    inputs:
      limit:
        description: 'Numero massimo auto da importare'
        required: false
        default: '650'
      pages_per_fuel:
        description: 'Pagine lista per alimentazione'
        required: false
        default: '1'
      delay:
        description: 'Secondi tra richieste Auto.it'
        required: false
        default: '25'
      backoff:
        description: 'Secondi di pausa se Auto.it/CDN risponde 429'
        required: false
        default: '120'
      download_images:
        description: 'Scarica immagini Motornet nel repo'
        required: false
        default: 'true'
      image_delay:
        description: 'Secondi tra download immagini Motornet'
        required: false
        default: '5'
      max_image_mb:
        description: 'Dimensione massima per immagine in MB'
        required: false
        default: '6'

permissions:
  contents: write

jobs:
  import-autoit:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4
      - name: Import Auto.it catalogue
        run: |
          python scripts/import_autoit.py \
            --limit "${{ github.event.inputs.limit }}" \
            --pages-per-fuel "${{ github.event.inputs.pages_per_fuel }}" \
            --delay "${{ github.event.inputs.delay }}" \
            --backoff "${{ github.event.inputs.backoff }}" \
            --download-images "${{ github.event.inputs.download_images }}" \
            --image-delay "${{ github.event.inputs.image_delay }}" \
            --max-image-mb "${{ github.event.inputs.max_image_mb }}"
      - name: Commit imported catalogue
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/cars_autoit.json assets/cars/autoit || true
          if git diff --cached --quiet; then
            echo "No Auto.it catalogue changes to commit."
            exit 0
          fi
          git commit -m "Import Auto.it catalogue"
          git pull --rebase origin main || true
          git push
