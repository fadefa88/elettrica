name: Process Motornet car images

on:
  workflow_dispatch:
    inputs:
      force:
        description: "Rigenera anche immagini già create"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      limit:
        description: "Numero massimo immagini da ispezionare/processare. 0 = tutte"
        required: false
        default: 0
        type: number
      input_dir:
        description: "Cartella immagini Motornet"
        required: false
        default: "assets/cars/motornet"
      output_dir:
        description: "Cartella PNG generati"
        required: false
        default: "assets/cars/motornet_processed"

permissions:
  contents: write

concurrency:
  group: process-motornet-car-images
  cancel-in-progress: false

jobs:
  process-images:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache model
        uses: actions/cache@v4
        with:
          path: ~/.u2net
          key: rembg-u2net-v1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pillow rembg onnxruntime

      - name: Resolve inputs
        id: vars
        shell: bash
        run: |
          LIMIT="${{ github.event.inputs.limit || '0' }}"
          FORCE="${{ github.event.inputs.force || 'false' }}"
          INPUT_DIR="${{ github.event.inputs.input_dir || 'assets/cars/motornet' }}"
          OUTPUT_DIR="${{ github.event.inputs.output_dir || 'assets/cars/motornet_processed' }}"

          if [[ ! "$LIMIT" =~ ^[0-9]+$ ]]; then
            echo "Invalid limit: $LIMIT. Use 0 or a positive integer."
            exit 1
          fi

          echo "limit=$LIMIT"
          echo "force=$FORCE"
          echo "input_dir=$INPUT_DIR"
          echo "output_dir=$OUTPUT_DIR"

          {
            echo "limit=$LIMIT"
            echo "force=$FORCE"
            echo "input_dir=$INPUT_DIR"
            echo "output_dir=$OUTPUT_DIR"
          } >> "$GITHUB_OUTPUT"

      - name: Process images
        run: |
          python scripts/process_motornet_images.py \
            --input-dir "${{ steps.vars.outputs.input_dir }}" \
            --output-dir "${{ steps.vars.outputs.output_dir }}" \
            --background "assets/sfondopippo.jpg" \
            --logo "assets/logopippo.png" \
            --force "${{ steps.vars.outputs.force }}" \
            --limit "${{ steps.vars.outputs.limit }}"

      - name: Commit generated images if any
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add "${{ steps.vars.outputs.output_dir }}"

          if git diff --cached --quiet; then
            echo "No processed Motornet images to commit."
            exit 0
          fi

          git commit -m "Process Motornet car images"

          for attempt in 1 2 3; do
            echo "Push attempt $attempt"
            git pull --rebase origin main
            if git push origin HEAD:main; then
              echo "Push completed."
              exit 0
            fi
            sleep 5
          done

          echo "Push failed after retries."
          exit 1
