name: Fetch car images

on:
  workflow_dispatch:
    inputs:
      limit:
        description: "Maximum number of catalogue cars to process"
        required: false
        default: "80"
      refresh:
        description: "Refresh already downloaded images"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: fetch-car-images
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch Wikimedia Commons images
        run: |
          if [ "${{ inputs.refresh }}" = "true" ]; then
            python scripts/fetch_car_images.py --limit "${{ inputs.limit }}" --refresh
          else
            python scripts/fetch_car_images.py --limit "${{ inputs.limit }}"
          fi

      - name: Commit images and metadata
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add assets/cars data/car_images.json
          if git diff --cached --quiet; then
            echo "No car images to commit."
            exit 0
          fi
          git commit -m "Fetch reusable car images"
          git pull --rebase origin "${GITHUB_REF_NAME}" || true
          git push
